<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Gestion de Tâches{% endblock %}</title>
    <style>
        * { box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: #f4f5f7;
            color: #222;
            margin: 0;
        }
        nav {
            background: #2c3e50;
            padding: 15px 30px;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        nav a {
            color: #fff;
            text-decoration: none;
            font-weight: 500;
        }
        nav a:hover { text-decoration: underline; }
        nav span { color: #ccc; margin-right: auto; }
        .container {
            max-width: 800px;
            margin: 30px auto;
            background: #fff;
            padding: 30px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }
        h2 { color: #2c3e50; margin-top: 0; }
        form label { display: block; margin-bottom: 15px; font-weight: 500; }
        input[type="text"], input[type="password"], textarea {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border: 1px solid #ccc;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background: #2c3e50;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 14px;
        }
        button:hover { background: #1a252f; }
        ul { list-style: none; padding: 0; }
        ul li {
            background: #f9f9f9;
            padding: 12px 15px;
            margin-bottom: 8px;
            border-radius: 4px;
            border-left: 4px solid #2c3e50;
        }
        ul li a { color: #2c3e50; font-weight: 600; text-decoration: none; }
        ul li a:hover { text-decoration: underline; }
        .messages p {
            background: #e8f5e9;
            border-left: 4px solid #4caf50;
            padding: 10px 15px;
            border-radius: 4px;
        }
        a.btn-link {
            display: inline-block;
            margin-bottom: 15px;
            color: #2c3e50;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <nav>
        {% if user.is_authenticated %}
            <span>Bonjour, {{ user.username }}</span>
            <a href="{% url 'projects:liste_projets' %}">Mes projets</a>
            <a href="{% url 'users:logout' %}">Déconnexion</a>
        {% else %}
            <a href="{% url 'users:login' %}">Connexion</a>
            <a href="{% url 'users:register' %}">Inscription</a>
        {% endif %}
    </nav>
    <div class="container">
        {% if messages %}
            <div class="messages">
                {% for message in messages %}
                    <p>{{ message }}</p>
                {% endfor %}
            </div>
        {% endif %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>s
